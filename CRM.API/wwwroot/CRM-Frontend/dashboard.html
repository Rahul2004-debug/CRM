<!DOCTYPE html>
<html>
<head>
    <title>CRM Dashboard</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
            display: flex;
            color: #e5e7eb;
            background: #020617;
        }

            /* 🔥 Background glow like login */
            body::before {
                content: "";
                position: fixed;
                width: 200%;
                height: 200%;
                background: radial-gradient(circle at 30% 30%, #6366f1, transparent), radial-gradient(circle at 70% 70%, #8b5cf6, transparent);
                animation: moveBg 12s infinite alternate;
                filter: blur(120px);
                z-index: -1;
            }

        @keyframes moveBg {
            from {
                transform: translate(-20%, -20%);
            }

            to {
                transform: translate(20%, 20%);
            }
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background: rgba(15,23,42,0.9);
            backdrop-filter: blur(20px);
            color: white;
            height: 100vh;
            padding: 20px;
            box-shadow: 6px 0 25px rgba(0,0,0,0.8);
        }

            .sidebar a {
                display: block;
                color: #cbd5f5;
                padding: 10px;
                text-decoration: none;
                border-radius: 8px;
                transition: 0.3s;
            }

                .sidebar a:hover {
                    background: rgba(99,102,241,0.2);
                    color: white;
                    transform: translateX(5px);
                }

        /* CONTENT */
        .content {
            flex: 1;
            padding: 20px;
            position: relative;
        }

        /* GRID */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        /* 🔥 GLASS CARDS */
        .card {
            background: rgba(15,23,42,0.7);
            backdrop-filter: blur(25px);
            padding: 20px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 15px 40px rgba(0,0,0,0.8), 0 0 15px rgba(99,102,241,0.2);
            transition: 0.3s;
        }

            .card:hover {
                transform: translateY(-5px);
                box-shadow: 0 20px 50px rgba(0,0,0,0.9), 0 0 20px rgba(139,92,246,0.4);
            }

        /* CHART */
        canvas {
            width: 100% !important;
            height: 300px !important;
        }

        /* 🔔 NOTIFICATION */
        .notif {
            position: absolute;
            top: 20px;
            right: 20px;
        }

            .notif button {
                font-size: 20px;
                background: none;
                border: none;
                cursor: pointer;
                color: white;
            }

        /* COUNT */
        #notifCount {
            background: #ef4444;
            color: white;
            padding: 2px 6px;
            border-radius: 50%;
            font-size: 12px;
        }

        /* DROPDOWN */
        #notifDropdown {
            display: none;
            background: rgba(15,23,42,0.95);
            backdrop-filter: blur(20px);
            width: 250px;
            max-height: 300px;
            overflow: auto;
            border-radius: 10px;
            padding: 10px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* HEADINGS */
        h1, h3 {
            color: #e0e7ff;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>CRM</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="customers.html">Customers</a>
        <a href="contacts.html">Contacts</a>
        <a href="notes.html">Notes</a>
    </div>

    <div class="content">

        <!-- 🔔 Notification -->
        <div class="notif">
            <button onclick="toggleNotifications()">
                <i class="fa fa-bell"></i>
                <span id="notifCount">0</span>
            </button>
            <div id="notifDropdown"></div>
        </div>

        <h1>CRM Analytics Dashboard</h1>

        <div class="chart-grid">

            <div class="card">
                <h3>Data Distribution</h3>
                <canvas id="pieChart"></canvas>
            </div>

            <div class="card">
                <h3>Comparison Overview</h3>
                <canvas id="barChart"></canvas>
            </div>

            <div class="card">
                <h3>Trend Visualization</h3>
                <canvas id="lineChart"></canvas>
            </div>

            <div class="card">
                <h3>Activity Overview</h3>
                <canvas id="doughnutChart"></canvas>
            </div>

        </div>

    </div>

    <!-- 🔥 IMPORTANT (CACHE FIX) -->
    <script src="js/dashboard.js?v=5"></script>

</body>
</html>
